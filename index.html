// Render function
function renderItem(it){
 let html='<div class="menu-item">';
 html+='<img class="item-thumb" src="'+it.img+'" alt="'+it.en+'" loading="lazy" onerror="this.src=\'data:image/svg+xml,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' width=\\\'100\\\' height=\\\'100\\\'><rect fill=\\\'%23D4A84320\\\' width=\\\'100\\\' height=\\\'100\\\'/><text x=\\\'50\\\' y=\\\'55\\\' text-anchor=\\\'middle\\\' fill=\\\'%23D4A843\\\' font-size=\\\'30\\\'>🍽</text></svg>\'">';
 html+='<div class="item-info">';
 html+='<span class="item-name-en">'+it.en+'</span>';
 html+='<span class="item-name-ar">'+it.ar+'</span>';
 if(it.desc)html+='<span class="item-desc">'+it.desc+'</span>';
 if(it.p&&it.p.length){
  html+='<div class="row-prices">';
  it.p.forEach(function(p){
   if(p.v){
    html+='<span class="row-price"><span class="p-label">'+p.l+': </span>'+p.v+' SAR</span>';
   }else{
    html+='<span class="row-price" style="border:1px dashed rgba(212,168,67,.15);background:transparent;color:rgba(212,168,67,.2)"><span class="p-label">'+p.l+': </span>___</span>';
   }
  });
  html+='</div>';
 }
 html+='</div></div>';
 return html;
}

// Render all categories
let allHtml='';
Object.keys(data).forEach(function(k){
 let cat=data[k];
 allHtml+='<section id="'+k+'" class="cat-section" data-cat="'+k+'">';
 allHtml+='<div class="cat-header-text"><span class="cat-banner-ar">'+cat.name+'</span><span class="cat-banner-en">'+cat.nameEn+'</span></div>';
 allHtml+='<div class="cat-banner"><img src="'+k+'_banner.jpg" alt="'+cat.nameEn+'" loading="lazy"></div>';
 allHtml+='<div class="cat-items">';
 cat.items.forEach(function(it){allHtml+=renderItem(it);});
 allHtml+='</div></section>';
});
document.getElementById('menuContainer').innerHTML=allHtml;

// TAB NAVIGATION
document.addEventListener('DOMContentLoaded',function(){
var tabs=document.querySelectorAll('.cat-tab');
var secs=document.querySelectorAll('.cat-section');
var nav=document.querySelector('.cat-nav');
tabs.forEach(function(t){
 t.addEventListener('click',function(){
  var id=this.getAttribute('data-target');
  if(!id)return;
  tabs.forEach(function(x){x.classList.remove('active')});
  this.classList.add('active');
  var el=document.getElementById(id);
  if(el){
   var top=el.getBoundingClientRect().top+window.pageYOffset-nav.offsetHeight-10;
   window.scrollTo({top:top,behavior:'smooth'});
  }
 });
});
var timer=null;
window.addEventListener('scroll',function(){
 if(timer)clearTimeout(timer);
 timer=setTimeout(function(){
  var fromTop=window.pageYOffset+nav.offsetHeight+20;
  var found=null;
  secs.forEach(function(s){if(s.offsetTop<=fromTop)found=s;});
  if(found){
   tabs.forEach(function(t){t.classList.remove('active')});
   var at=document.querySelector('.cat-tab[data-target="'+found.id+'"]');
   if(at)at.classList.add('active');
  }
 },100);
});
});

function filterMenu(q){
 var qu=q.toLowerCase().trim();
 var items=document.querySelectorAll('.menu-item');
 var secs=document.querySelectorAll('.cat-section');
 var any=false;
 items.forEach(function(i){
  var t=i.textContent.toLowerCase();
  var m=!qu||t.includes(qu);
  i.style.display=m?'':'none';
  if(m)any=true
 });
 secs.forEach(function(s){
  var vis=s.querySelectorAll('.menu-item:not([style*="display: none"])').length;
  s.style.display=(!qu||vis>0)?'':'none'
 });
 document.getElementById('noResults').style.display=any||!qu?'none':'block'
}
</script>
