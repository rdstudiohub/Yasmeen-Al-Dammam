// Render
function r(it){
 let h='<div class="mi">';
 h+='<img class="mi-img" src="'+it.img+'" alt="'+it.en+'" loading="lazy" onerror="this.src=\'data:image/svg+xml,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' width=\\\'100\\\' height=\\\'100\\\'><rect fill=\\\'%23D4A84320\\\' width=\\\'100\\\' height=\\\'100\\\'/><text x=\\\'50\\\' y=\\\'55\\\' text-anchor=\\\'middle\\\' fill=\\\'%23D4A843\\\' font-size=\\\'30\\\'>🍽</text></svg>\'">';
 h+='<div class="mi-info"><span class="mi-en">'+it.en+'</span><span class="mi-ar">'+it.ar+'</span>';
 if(it.p&&it.p.length){
  h+='<div class="pr">';
  it.p.forEach(function(p){h+='<span class="pt"><span class="pl">'+p.l+': </span>'+p.v+' SR</span>';});
  h+='</div>';
 }
 h+='</div></div>';
 return h;
}

var html='';
Object.keys(D).forEach(function(k){
 var c=D[k];
 html+='<section id="'+k+'" class="cat-section">';
 html+='<div class="cat-header"><span class="cat-ar">'+c.ar+'</span><span class="cat-en">'+c.en+'</span></div>';
 html+='<div class="cat-banner"><img src="'+c.bn+'" alt="'+c.en+'" loading="lazy"></div>';
 html+='<div class="cat-items">';
 c.items.forEach(function(it){html+=r(it);});
 html+='</div></section>';
});
document.getElementById('mc').innerHTML=html;

// Tabs
document.addEventListener('DOMContentLoaded',function(){
var ct=document.querySelectorAll('.ct');
var ss=document.querySelectorAll('.cat-section');
var nv=document.getElementById('nv');
ct.forEach(function(t){
 t.addEventListener('click',function(){
  var id=this.getAttribute('data-t');
  if(!id)return;
  ct.forEach(function(x){x.classList.remove('act')});
  this.classList.add('act');
  var el=document.getElementById(id);
  if(el){var top=el.getBoundingClientRect().top+window.pageYOffset-nv.offsetHeight-10;window.scrollTo({top:top,behavior:'smooth'});}
 });
});
var tm=null;
window.addEventListener('scroll',function(){
 if(tm)clearTimeout(tm);
 tm=setTimeout(function(){
  var ft=window.pageYOffset+nv.offsetHeight+20;
  var f=null;
  ss.forEach(function(s){if(s.offsetTop<=ft)f=s;});
  if(f){ct.forEach(function(t){t.classList.remove('act')});var a=document.querySelector('.ct[data-t="'+f.id+'"]');if(a)a.classList.add('act');}
 },100);
});
});

function f(q){
 var qu=q.toLowerCase().trim();
 var items=document.querySelectorAll('.mi');
 var ss=document.querySelectorAll('.cat-section');
 var any=false;
 items.forEach(function(i){var t=i.textContent.toLowerCase();var m=!qu||t.includes(qu);i.style.display=m?'':'none';if(m)any=true});
 ss.forEach(function(s){var v=s.querySelectorAll('.mi:not([style*=\"display: none\"])').length;s.style.display=(!qu||v>0)?'':'none'});
 document.getElementById('nr').style.display=any||!qu?'none':'block';
}
</script>
